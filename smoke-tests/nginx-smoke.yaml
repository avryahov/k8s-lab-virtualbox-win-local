# -----------------------------------------------------------------------------
# Этот манифест нужен как самый простой повторяемый smoke-test для stage1.
# Он проверяет не только запуск Pod-ов, но и работу Service внутри кластера.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: smoke-tests
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-smoke
  namespace: smoke-tests
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-smoke
  template:
    metadata:
      labels:
        app: nginx-smoke
    spec:
      # Стараемся распределить Pod-ы по разным нодам, чтобы проверить,
      # что межнодовая сеть и сервисная маршрутизация тоже реально работают.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: nginx-smoke
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-smoke
  namespace: smoke-tests
spec:
  selector:
    app: nginx-smoke
  ports:
  - name: http
    port: 80
    targetPort: 80
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nginx-smoke-check
  namespace: smoke-tests
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: curl
        image: curlimages/curl:8.8.0
        command:
        - sh
        - -c
        - |
          # Job запускается уже внутри кластера и проверяет Service по DNS-имени.
          # Если Service и Pod-сеть работают правильно, curl завершается успешно.
          for i in $(seq 1 30); do
            curl -fsS http://nginx-smoke >/dev/null && exit 0
            sleep 5
          done
          exit 1
